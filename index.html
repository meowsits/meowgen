<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowgen | Zen Sanctuary</title>
    <style>
        :root { --black: #000000; --white: #FFFFFF; }
        body { margin: 0; padding: 0; height: 100vh; background-color: var(--white); color: var(--black); font-family: 'Georgia', serif; display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background-color: var(--black); color: var(--white); padding: 1.5rem; text-align: center; position: relative; }
        .return-link { position: absolute; left: 1.5rem; top: 1.5rem; color: var(--white); text-decoration: none; font-size: 0.8rem; border-bottom: 1px solid var(--white); text-transform: uppercase; }
        .chat-log { flex-grow: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; align-items: center; }
        .chat-log-inner { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 1.5rem; }
        .message { padding: 1rem; line-height: 1.6; max-width: 85%; word-wrap: break-word; }
        .user-msg { background-color: var(--black); color: var(--white); align-self: flex-end; border-radius: 12px 12px 0 12px; }
        .bot-msg { background-color: var(--white); color: var(--black); border: 1px solid var(--black); align-self: flex-start; border-radius: 12px 12px 12px 0; }
        .input-area { padding: 1.5rem; border-top: 2px solid var(--black); display: flex; justify-content: center; gap: 1rem; }
        #chat-input { width: 100%; max-width: 600px; padding: 0.8rem; border: 1px solid var(--black); font-family: inherit; }
        #send-btn { background: var(--black); color: var(--white); border: none; padding: 0 1.5rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="chat-header">
        <a href="https://meowsits.github.io/meowsits/" class="return-link">← Return</a>
        <h1>MEOWGEN</h1>
    </div>
    
    <div class="chat-log" id="chat-log">
        <div class="chat-log-inner" id="chat-log-inner">
            <div class="message bot-msg">*Purr...* The gate is open. What is on your mind?</div>
        </div>
    </div>
    
    <div class="input-area">
        <input type="text" id="chat-input" placeholder="Speak with Meowgen..." autocomplete="off">
        <button id="send-btn">Ask</button>
    </div>

    <script>
        const MY_API_KEY = 'AIzaSyCtsOJA4LV4j8gKq5mauLsFEvJAmKm0dDQ'; 
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const chatLogInner = document.getElementById('chat-log-inner');
        const chatLog = document.getElementById('chat-log');

        function append(text, sender) {
            const msg = document.createElement('div');
            msg.className = 'message ' + sender + '-msg';
            msg.innerText = text;
            chatLogInner.appendChild(msg);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        async function askMeowgen() {
            const text = chatInput.value.trim();
            if (!text || MY_API_KEY.includes('PASTE_')) return;

            append(text, 'user');
            chatInput.value = '';

            const typing = document.createElement('div');
            typing.className = 'message bot-msg';
            typing.innerText = '*Listening...*';
            chatLogInner.appendChild(typing);

            try {
                // We use standard 'plus' signs to combine the URL and the Key.
                // This is the most reliable way to avoid syntax errors.
                const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + MY_API_KEY;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: "You are Meowgen, a Zen cat inspired by Dogen. Short, wise, feline-themed advice. Purr occasionally.\n\nUser: " + text
                            }]
                        }]
                    })
                });

                const data = await response.json();
                typing.remove();

                if (data.candidates && data.candidates[0]) {
                    append(data.candidates[0].content.parts[0].text, 'bot');
                } else if (data.error) {
                    append("*The garden whispers an error: " + data.error.message + "*", 'bot');
                }
            } catch (e) {
                if (typing) typing.remove();
                append("*The mist thickens... please try again.*", 'bot');
            }
        }

        sendBtn.onclick = askMeowgen;
        chatInput.onkeydown = function(e) { if(e.key === 'Enter') askMeowgen(); };
    </script>
</body>
</html>
