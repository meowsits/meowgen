<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misty Meowsits | Zen Sanctuary</title>
    <style>
        /* Color Palette & Themes */
        :root {
            --matcha: #C5D8A4;
            --linen: #FAF5E9;
            --dark-text: #4A5D23;
            --glass: rgba(250, 245, 233, 0.85);
        }
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: var(--linen);
            color: var(--dark-text);
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background-color 2s ease;
        }

        /* The Breathing Cat Centerpiece */
        .sanctuary-center {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .meditating-cat {
            font-size: 8rem;
            cursor: pointer;
            /* 4 seconds in, 4 seconds out */
            animation: breathe 8s ease-in-out infinite; 
            user-select: none;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .purrspective {
            margin-top: 2rem;
            font-size: 1.2rem;
            font-style: italic;
            opacity: 0;
            transition: opacity 1s ease;
            min-height: 3rem;
        }

        /* Hamburger Menu Icon */
        .menu-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2.2rem;
            cursor: pointer;
            z-index: 100;
            user-select: none;
            color: var(--dark-text);
            transition: transform 0.3s ease;
        }

        .menu-btn:hover {
            transform: scale(1.1);
        }

        /* Frosted Glass Slide-out Chat Menu */
        .slide-menu {
            position: absolute;
            top: 0;
            right: -400px; /* Hidden off-screen */
            width: 350px;
            max-width: 100vw;
            height: 100vh;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: right 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 110;
            box-shadow: -5px 0 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            box-sizing: border-box;
        }

        .slide-menu.open {
            right: 0;
        }

        .close-btn {
            align-self: flex-end;
            font-size: 1.8rem;
            cursor: pointer;
            margin-bottom: 1.5rem;
            color: var(--dark-text);
        }

        /* Chatbot Interface Styles */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .chat-log {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 1rem;
            padding-right: 10px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scrollbar-width: thin;
            scrollbar-color: var(--matcha) transparent;
        }

        .message {
            padding: 0.9rem;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.5;
            max-width: 85%;
        }

        .user-msg {
            background-color: var(--matcha);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot-msg {
            background-color: rgba(255, 255, 255, 0.6);
            align-self: flex-start;
            border-left: 4px solid var(--matcha);
            border-bottom-left-radius: 2px;
        }

        .chat-input-area {
            display: flex;
            gap: 0.5rem;
            padding-top: 10px;
            border-top: 1px solid var(--matcha);
        }

        #chat-input {
            flex-grow: 1;
            padding: 0.8rem;
            border: 1px solid var(--matcha);
            border-radius: 6px;
            background: rgba(255,255,255,0.4);
            color: var(--dark-text);
            font-family: inherit;
        }

        #chat-input:focus {
            outline: none;
            background: rgba(255,255,255,0.8);
        }

        #send-btn {
            background: var(--matcha);
            border: none;
            color: var(--dark-text);
            padding: 0 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        #send-btn:hover {
            background: #b5c894;
        }
        
        /* The Misty Overlay Effect */
        .mist-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, transparent 30%, rgba(250, 245, 233, 0.6) 100%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="mist-layer"></div>

    <div class="menu-btn" id="open-menu">☰</div>

    <div class="sanctuary-center">
        <div class="meditating-cat" id="zen-cat">🐈</div>
        <div class="purrspective" id="quote-display">Breathe in. Breathe out.</div>
    </div>

    <div class="slide-menu" id="side-panel">
        <div class="close-btn" id="close-menu">✕</div>
        
        <div class="chat-container">
            <div class="chat-log" id="chat-log">
                <div class="message bot-msg">
                    *Purr...* Welcome to the misty sanctuary. I am Meowgen, inspired by Dogen. What brings you to this moment?
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Speak with Meowgen..." autocomplete="off">
                <button id="send-btn">Ask</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Zen UI Elements ---
        const cat = document.getElementById('zen-cat');
        const quoteDisplay = document.getElementById('quote-display');
        const openMenuBtn = document.getElementById('open-menu');
        const closeMenuBtn = document.getElementById('close-menu');
        const sidePanel = document.getElementById('side-panel');

        // Mindful local quotes for clicking the cat
        const purrspectives = [
            "Do not seek the truth, only cease to cherish opinions.",
            "A flower falls, even though we love it.",
            "To study the Way is to study the self.",
            "The moon reflects in the water, yet the water is not disturbed.",
            "Sit like a mountain. Purr like a river."
        ];

        // Fade in a random quote when the cat is clicked
        cat.addEventListener('click', () => {
            quoteDisplay.style.opacity = 0;
            setTimeout(() => {
                const randomQuote = purrspectives[Math.floor(Math.random() * purrspectives.length)];
                quoteDisplay.innerText = randomQuote;
                quoteDisplay.style.opacity = 1;
            }, 500); 
        });

        // Hamburger Menu & Close "X" Logic
        openMenuBtn.addEventListener('click', () => {
            sidePanel.classList.add('open');
        });

        closeMenuBtn.addEventListener('click', () => {
            sidePanel.classList.remove('open');
        });

        // --- 2. Secure Meowgen Chatbot Logic ---
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const chatLog = document.getElementById('chat-log');

        // Helper to put messages on the screen
        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'user-msg' : 'bot-msg');
            msgDiv.innerText = text;
            chatLog.appendChild(msgDiv);
            chatLog.scrollTop = chatLog.scrollHeight; 
        }

        // The secure middleman connection
        async function askMeowgen(userText) {
            appendMessage(userText, 'user');
            chatInput.value = '';

            // Add typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.classList.add('message', 'bot-msg');
            typingDiv.innerText = '*Meditating on your words...*';
            typingDiv.id = 'typing-indicator';
            chatLog.appendChild(typingDiv);
            chatLog.scrollTop = chatLog.scrollHeight;

            try {
                // This calls your Netlify serverless function securely!
                const response = await fetch('/.netlify/functions/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText })
                });
                
                const data = await response.json();
                
                document.getElementById('typing-indicator').remove();
                
                // Display Meowgen's response
                if (data.reply) {
                    appendMessage(data.reply, 'bot');
                } else if (data.error) {
                    appendMessage(data.error, 'bot');
                }
            } catch (error) {
                console.error("Connection lost.", error);
                document.getElementById('typing-indicator').remove();
                appendMessage("*A gentle breeze disrupts the connection... Please try again.*", 'bot');
            }
        }

        // Trigger chat via button click or Enter key
        sendBtn.addEventListener('click', () => {
            const text = chatInput.value.trim();
            if (text) askMeowgen(text);
        });

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const text = chatInput.value.trim();
                if (text) askMeowgen(text);
            }
        });
    </script>
</body>
</html>
