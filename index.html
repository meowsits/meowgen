<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowgen | Zen Sanctuary</title>
    <style>
        /* Minimalist Black and White Palette */
        :root {
            --black: #000000;
            --white: #FFFFFF;
        }
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: var(--white);
            color: var(--black);
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        /* Header Area */
        .chat-header {
            background-color: var(--black);
            color: var(--white);
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .return-link {
            position: absolute;
            left: 2rem;
            color: var(--white);
            text-decoration: none;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--white);
            padding-bottom: 2px;
            transition: opacity 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .return-link:hover {
            opacity: 0.6;
        }

        .header-titles {
            text-align: center;
        }

        .header-titles h1 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: normal;
            letter-spacing: 4px;
        }

        /* Scrolling Chat Log */
        .chat-log {
            flex-grow: 1;
            overflow-y: auto;
            padding: 2rem;
            background-color: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chat-log-inner {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            padding: 1.2rem;
            font-size: 1.05rem;
            line-height: 1.6;
            max-width: 85%;
            word-wrap: break-word;
        }

        .user-msg {
            background-color: var(--black);
            color: var(--white);
            align-self: flex-end;
            border-radius: 12px 12px 0 12px;
        }

        .bot-msg {
            background-color: var(--white);
            color: var(--black);
            align-self: flex-start;
            border: 1px solid var(--black);
            border-radius: 12px 12px 12px 0;
        }

        /* Input Area */
        .chat-input-area {
            display: flex;
            padding: 1.5rem 2rem;
            background: var(--white);
            border-top: 2px solid var(--black);
            justify-content: center;
        }

        .input-wrapper {
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 1rem;
        }

        #chat-input {
            flex-grow: 1;
            padding: 1rem;
            border: 1px solid var(--black);
            font-family: inherit;
            font-size: 1rem;
            color: var(--black);
            background: var(--white);
        }

        #chat-input:focus {
            outline: none;
            box-shadow: inset 0 0 0 1px var(--black);
        }

        #send-btn {
            background: var(--black);
            border: 1px solid var(--black);
            color: var(--white);
            padding: 0 2rem;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        #send-btn:hover {
            background: var(--white);
            color: var(--black);
        }

        @media (max-width: 600px) {
            .chat-header { flex-direction: column; padding: 1rem; }
            .return-link { position: static; margin-bottom: 0.5rem; }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <a href="https://meowsits.github.io/meowsits/" class="return-link">← Return</a>
            <div class="header-titles">
                <h1>MEOWGEN</h1>
            </div>
        </div>
        
        <div class="chat-log" id="chat-log">
            <div class="chat-log-inner" id="chat-log-inner">
                <div class="message bot-msg">
                    *Purr...* The digital garden is still. I am Meowgen. What is on your mind in this moment?
                </div>
            </div>
        </div>
        
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="chat-input" placeholder="Speak with Meowgen..." autocomplete="off">
                <button id="send-btn">Ask</button>
            </div>
        </div>
    </div>

    <script>
        const KEY = 'AIzaSyCtsOJA4LV4j8gKq5mauLsFEvJAmKm0dDQ';
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const chatLogInner = document.getElementById('chat-log-inner');
        const chatLog = document.getElementById('chat-log');

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}-msg`;
            msgDiv.innerText = text;
            chatLogInner.appendChild(msgDiv);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        async function askMeowgen() {
            const text = chatInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            chatInput.value = '';

            const typing = document.createElement('div');
            typing.className = 'message bot-msg';
            typing.innerText = '*Listening to the silence...*';
            chatLogInner.appendChild(typing);
            chatLog.scrollTop = chatLog.scrollHeight;

            try {
                // Direct fetch to Google's API
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `You are Meowgen, a Zen cat inspired by Dogen. Give short, wise, feline-themed advice and koans. Purr occasionally.\n\nUser: ${text}`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                typing.remove();

                if (data.candidates && data.candidates[0]) {
                    appendMessage(data.candidates[0].content.parts[0].text, 'bot');
                } else {
                    throw new Error("Empty response");
                }
            } catch (e) {
                if (typing) typing.remove();
                appendMessage("*The mist thickens... please wait a moment and try again.*", 'bot');
                console.error("Zen mind interrupted:", e);
            }
        }

        sendBtn.onclick = askMeowgen;
        chatInput.onkeydown = (e) => { if(e.key === 'Enter') askMeowgen(); };
    </script>
</body>
</html>
