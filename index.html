<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowgen | Zen Chatbot</title>
    <style>
        /* Minimalist Black and White Palette */
        :root {
            --black: #000000;
            --white: #FFFFFF;
        }
        
        body {
            margin: 0;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
            background-color: var(--white);
            color: var(--black);
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Return Link */
        .return-link {
            margin-bottom: 20px;
            color: var(--black);
            text-decoration: none;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--black);
            padding-bottom: 2px;
            transition: opacity 0.3s ease;
            letter-spacing: 1px;
        }

        .return-link:hover {
            opacity: 0.5;
        }

        /* Centered Chat Sanctuary */
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background: var(--white);
            border: 2px solid var(--black);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 8px 8px 0px var(--black); /* Bold architectural shadow */
        }

        .chat-header {
            background-color: var(--black);
            color: var(--white);
            padding: 1.5rem;
            text-align: center;
        }

        .chat-header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: normal;
            letter-spacing: 3px;
        }

        .chat-header p {
            margin: 5px 0 0 0;
            font-size: 0.9rem;
            font-style: italic;
            opacity: 0.8;
        }

        .chat-log {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            background-color: var(--white);
            scrollbar-width: thin;
            scrollbar-color: var(--black) var(--white);
        }

        .message {
            padding: 1rem;
            font-size: 1rem;
            line-height: 1.6;
            max-width: 80%;
            word-wrap: break-word;
        }

        /* Inverted colors for contrast */
        .user-msg {
            background-color: var(--black);
            color: var(--white);
            align-self: flex-end;
            border-radius: 8px 8px 0 8px;
        }

        .bot-msg {
            background-color: var(--white);
            color: var(--black);
            align-self: flex-start;
            border: 1px solid var(--black);
            border-radius: 8px 8px 8px 0;
        }

        .chat-input-area {
            display: flex;
            padding: 1rem;
            background: var(--white);
            border-top: 2px solid var(--black);
            gap: 0.8rem;
        }

        #chat-input {
            flex-grow: 1;
            padding: 1rem;
            border: 1px solid var(--black);
            border-radius: 0; /* Sharp corners for minimalist feel */
            font-family: inherit;
            font-size: 1rem;
            color: var(--black);
            background: var(--white);
            transition: box-shadow 0.3s ease;
        }

        #chat-input:focus {
            outline: none;
            box-shadow: inset 0 0 0 1px var(--black);
        }

        #send-btn {
            background: var(--black);
            border: 1px solid var(--black);
            color: var(--white);
            padding: 0 1.5rem;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        #send-btn:hover {
            background: var(--white);
            color: var(--black);
        }
    </style>
</head>
<body>

    <a href="https://meowsits.github.io/meowsits/" class="return-link">← Return to Sanctuary</a>

    <div class="chat-container">
        <div class="chat-header">
            <h1>MEOWGEN</h1>
            <p>A Zen Cat Chatbot</p>
        </div>
        
        <div class="chat-log" id="chat-log">
            <div class="message bot-msg">
                *Purr...* Welcome. I am Meowgen, inspired by Dogen. What brings you to this moment?
            </div>
        </div>
        
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Speak with Meowgen..." autocomplete="off">
            <button id="send-btn">Ask</button>
        </div>
    </div>

    <script>
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const chatLog = document.getElementById('chat-log');

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'user-msg' : 'bot-msg');
            msgDiv.innerText = text;
            chatLog.appendChild(msgDiv);
            chatLog.scrollTop = chatLog.scrollHeight; 
        }

        async function askMeowgen(userText) {
            appendMessage(userText, 'user');
            chatInput.value = '';

            const typingDiv = document.createElement('div');
            typingDiv.classList.add('message', 'bot-msg');
            typingDiv.innerText = '*Meditating on your words...*';
            typingDiv.id = 'typing-indicator';
            chatLog.appendChild(typingDiv);
            chatLog.scrollTop = chatLog.scrollHeight;

            try {
                // The securely bridged path to your Netlify vault
                const response = await fetch('https://meowsits.netlify.app/.netlify/functions/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText })
                });
                
                const data = await response.json();
                
                document.getElementById('typing-indicator').remove();
                
                if (data.reply) {
                    appendMessage(data.reply, 'bot');
                } else if (data.error) {
                    appendMessage(data.error, 'bot');
                }
            } catch (error) {
                console.error("Connection lost.", error);
                if(document.getElementById('typing-indicator')) {
                    document.getElementById('typing-indicator').remove();
                }
                appendMessage("*A gentle breeze disrupts the connection... Please try again.*", 'bot');
            }
        }

        sendBtn.addEventListener('click', () => {
            const text = chatInput.value.trim();
            if (text) askMeowgen(text);
        });

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const text = chatInput.value.trim();
                if (text) askMeowgen(text);
            }
        });
    </script>
</body>
</html>
