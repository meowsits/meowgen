<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowgen | Zen Chatbot</title>
    <style>
        /* Mindful Color Palette */
        :root {
            --matcha: #C5D8A4;
            --linen: #FAF5E9;
            --dark-text: #4A5D23;
            --white: #FFFFFF;
        }
        
        body {
            margin: 0;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
            background-color: var(--linen);
            color: var(--dark-text);
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Centered Chat Sanctuary */
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 85vh;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(74, 93, 35, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--matcha);
        }

        .chat-header {
            background-color: var(--matcha);
            padding: 1.5rem;
            text-align: center;
            border-bottom: 2px solid #b5c894;
        }

        .chat-header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: normal;
        }

        .chat-header p {
            margin: 5px 0 0 0;
            font-size: 0.9rem;
            font-style: italic;
            opacity: 0.8;
        }

        .chat-log {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background-color: rgba(250, 245, 233, 0.3);
            scrollbar-width: thin;
            scrollbar-color: var(--matcha) transparent;
        }

        .message {
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            line-height: 1.6;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user-msg {
            background-color: var(--matcha);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot-msg {
            background-color: var(--linen);
            align-self: flex-start;
            border-left: 4px solid var(--matcha);
            border-bottom-left-radius: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .chat-input-area {
            display: flex;
            padding: 1rem;
            background: var(--white);
            border-top: 1px solid rgba(197, 216, 164, 0.5);
            gap: 0.8rem;
        }

        #chat-input {
            flex-grow: 1;
            padding: 1rem;
            border: 1px solid var(--matcha);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            color: var(--dark-text);
            background: var(--linen);
            transition: all 0.3s ease;
        }

        #chat-input:focus {
            outline: none;
            background: var(--white);
            box-shadow: 0 0 0 2px rgba(197, 216, 164, 0.5);
        }

        #send-btn {
            background: var(--matcha);
            border: none;
            color: var(--dark-text);
            padding: 0 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            font-family: inherit;
            transition: background 0.3s;
        }

        #send-btn:hover {
            background: #b5c894;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <h1>Meowgen</h1>
            <p>A Zen Cat Chatbot</p>
        </div>
        
        <div class="chat-log" id="chat-log">
            <div class="message bot-msg">
                *Purr...* Welcome. I am Meowgen, inspired by Dogen. What brings you to this moment?
            </div>
        </div>
        
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Speak with Meowgen..." autocomplete="off">
            <button id="send-btn">Ask</button>
        </div>
    </div>
