<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowgen | Zen Sanctuary</title>
    <style>
        /* Minimalist Zen Theme */
        :root {
            --black: #000000;
            --white: #FFFFFF;
            --gray: #f4f4f4;
        }
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: var(--white);
            color: var(--black);
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        /* Header Area */
        .chat-header {
            background-color: var(--black);
            color: var(--white);
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .return-link {
            position: absolute;
            left: 2rem;
            color: var(--white);
            text-decoration: none;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--white);
            padding-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-titles h1 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: normal;
            letter-spacing: 4px;
        }

        /* Chat Log */
        .chat-log {
            flex-grow: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
        }

        .chat-log-inner {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            padding: 1.2rem;
            font-size: 1.05rem;
            line-height: 1.6;
            max-width: 85%;
            word-wrap: break-word;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            background-color: var(--black);
            color: var(--white);
            align-self: flex-end;
            border-radius: 12px 12px 0 12px;
        }

        .bot-msg {
            background-color: var(--white);
            color: var(--black);
            align-self: flex-start;
            border: 1px solid var(--black);
            border-radius: 12px 12px 12px 0;
        }

        /* Input Area */
        .chat-input-area {
            padding: 1.5rem 2rem;
            background: var(--white);
            border-top: 2px solid var(--black);
            display: flex;
            justify-content: center;
        }

        .input-wrapper {
            width: 100%;
            max-width: 700px;
            display: flex;
            gap: 1rem;
        }

        #chat-input {
            flex-grow: 1;
            padding: 1rem;
            border: 1px solid var(--black);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        #send-btn {
            background: var(--black);
            color: var(--white);
            border: 1px solid var(--black);
            padding: 0 2rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        #send-btn:hover {
            background: var(--white);
            color: var(--black);
        }

        @media (max-width: 600px) {
            .return-link { position: static; margin-bottom: 0.5rem; }
            .chat-header { flex-direction: column; padding: 1rem; }
        }
    </style>
</head>
<body>

    <div class="chat-header">
        <a href="https://meowsits.github.io/meowsits/" class="return-link">← Return</a>
        <div class="header-titles">
            <h1>MEOWGEN</h1>
        </div>
    </div>
    
    <div class="chat-log" id="chat-log">
        <div class="chat-log-inner" id="chat-log-inner">
            <div class="message bot-msg">
                *Purr...* The old bridges are gone. The path is direct. I am Meowgen. What is on your mind?
            </div>
        </div>
    </div>
    
    <div class="chat-input-area">
        <div class="input-wrapper">
            <input type="text" id="chat-input" placeholder="Speak with Meowgen..." autocomplete="off">
            <button id="send-btn">Ask</button>
        </div>
    </div>

    <script>
        // --- PUT YOUR KEY HERE ---
        const KEY = 'YOUR_ACTUAL_API_KEY_HERE'; 

        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const chatLogInner = document.getElementById('chat-log-inner');
        const chatLog = document.getElementById('chat-log');

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}-msg`;
            msgDiv.innerText = text;
            chatLogInner.appendChild(msgDiv);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        async function askMeowgen() {
            const text = chatInput.value.trim();
            if (!text || !KEY || KEY === 'AIzaSyCtsOJA4LV4j8gKq5mauLsFEvJAmKm0dDQ') return;

            appendMessage(text, 'user');
            chatInput.value = '';

            const typing = document.createElement('div');
            typing.className = 'message bot-msg';
            typing.innerText = '*Listening to the silence...*';
            chatLogInner.appendChild(typing);
            chatLog.scrollTop = chatLog.scrollHeight;

            try {
                const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + KEY;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: "You are Meowgen, a Zen cat inspired by Dogen. Give short, wise, feline-themed advice and koans.\n\nUser: " + text
                            }]
                        }]
                    })
                });

                const data = await response.json();
                typing.remove();

                if (data.candidates && data.candidates[0]) {
                    appendMessage(data.candidates[0].content.parts[0].text, 'bot');
                } else if (data.error) {
                    appendMessage("*The garden whispers an error: " + data.error.message + "*", 'bot');
                }
            } catch (e) {
                if (typing) typing.remove();
                appendMessage("*The mist thickens... please try again.*", 'bot');
            }
        }

        sendBtn.onclick = askMeowgen;
        chatInput.onkeydown = (e) => { if(e.key === 'Enter') askMeowgen(); };
    </script>
</body>
</html>
