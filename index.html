<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowgen | Zen Chatbot</title>
    <style>
        /* Minimalist Black and White Palette */
        :root {
            --black: #000000;
            --white: #FFFFFF;
        }
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: var(--white);
            color: var(--black);
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevents whole page from scrolling, keeps input fixed */
        }

        /* Edge-to-Edge Container */
        .chat-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--white);
        }

        /* Top Header Area */
        .chat-header {
            background-color: var(--black);
            color: var(--white);
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .return-link {
            position: absolute;
            left: 2rem;
            color: var(--white);
            text-decoration: none;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--white);
            padding-bottom: 2px;
            transition: opacity 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .return-link:hover {
            opacity: 0.6;
        }

        .header-titles {
            text-align: center;
        }

        .header-titles h1 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: normal;
            letter-spacing: 4px;
        }

        .header-titles p {
            margin: 5px 0 0 0;
            font-size: 0.9rem;
            font-style: italic;
            opacity: 0.8;
        }

        /* Chat Log Area */
        .chat-log {
            flex-grow: 1;
            overflow-y: auto;
            padding: 2rem;
            background-color: var(--white);
            scrollbar-width: thin;
            scrollbar-color: var(--black) var(--white);
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers the messages column on large screens */
        }

        /* Keeps the text from stretching too wide on massive monitors */
        .chat-log-inner {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            padding: 1.2rem;
            font-size: 1.05rem;
            line-height: 1.6;
            max-width: 85%;
            word-wrap: break-word;
        }

        .user-msg {
            background-color: var(--black);
            color: var(--white);
            align-self: flex-end;
            border-radius: 8px 8px 0 8px;
        }

        .bot-msg {
            background-color: var(--white);
            color: var(--black);
            align-self: flex-start;
            border: 1px solid var(--black);
            border-radius: 8px 8px 8px 0;
        }

        /* Input Area at the Bottom */
        .chat-input-area {
            display: flex;
            padding: 1.5rem 2rem;
            background: var(--white);
            border-top: 2px solid var(--black);
            justify-content: center;
        }

        .input-wrapper {
            width: 100%;
            max-width: 900px;
            display: flex;
            gap: 1rem;
        }

        #chat-input {
            flex-grow: 1;
            padding: 1rem;
            border: 1px solid var(--black);
            border-radius: 0; 
            font-family: inherit;
            font-size: 1.05rem;
            color: var(--black);
            background: var(--white);
            transition: box-shadow 0.3s ease;
        }

        #chat-input:focus {
            outline: none;
            box-shadow: inset 0 0 0 1px var(--black);
        }

        #send-btn {
            background: var(--black);
            border: 1px solid var(--black);
            color: var(--white);
            padding: 0 2rem;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        #send-btn:hover {
            background: var(--white);
            color: var(--black);
        }

        /* Mobile tweaks to ensure the return link fits */
        @media (max-width: 600px) {
            .chat-header {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            .return-link {
                position: static;
                align-self: flex-start;
            }
            .chat-input-area {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <a href="https://meowsits.github.io/meowsits/" class="return-link">← Return</a>
            <div class="header-titles">
                <h1>MEOWGEN</h1>
                <p>Dogen Inspired Catbot</p>
            </div>
        </div>
        
        <div class="chat-log" id="chat-log">
            <div class="chat-log-inner" id="chat-log-inner">
                <div class="message bot-msg">
                    *Purr...* Welcome. I am Meowgen, inspired by Dogen. What brings you to this moment?
                </div>
            </div>
        </div>
        
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="chat-input" placeholder="Speak with Meowgen..." autocomplete="off">
                <button id="send-btn">Ask</button>
            </div>
        </div>
    </div>

    <script>
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const chatLog = document.getElementById('chat-log');
        const chatLogInner = document.getElementById('chat-log-inner');

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'user-msg' : 'bot-msg');
            msgDiv.innerText = text;
            chatLogInner.appendChild(msgDiv);
            chatLog.scrollTop = chatLog.scrollHeight; 
        }

        async function askMeowgen(userText) {
            appendMessage(userText, 'user');
            chatInput.value = '';

            const typingDiv = document.createElement('div');
            typingDiv.classList.add('message', 'bot-msg');
            typingDiv.innerText = '*Meditating on your words...*';
            typingDiv.id = 'typing-indicator';
            chatLogInner.appendChild(typingDiv);
            chatLog.scrollTop = chatLog.scrollHeight;

            try {
                const response = await fetch('https://meowsits.netlify.app/.netlify/functions/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText })
                });
                
                const data = await response.json();
                
                document.getElementById('typing-indicator').remove();
                
                if (data.reply) {
                    appendMessage(data.reply, 'bot');
                } else if (data.error) {
                    appendMessage(data.error, 'bot');
                }
            } catch (error) {
                console.error("Connection lost.", error);
                if(document.getElementById('typing-indicator')) {
                    document.getElementById('typing-indicator').remove();
                }
                appendMessage("*A gentle breeze disrupts the connection... Please try again.*", 'bot');
            }
        }

        sendBtn.addEventListener('click', () => {
            const text = chatInput.value.trim();
            if (text) askMeowgen(text);
        });

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const text = chatInput.value.trim();
                if (text) askMeowgen(text);
            }
        });
    </script>
</body>
</html>
